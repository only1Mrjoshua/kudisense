    <script>
      // ============================================
      // VISIBLE PARTICLE ANIMATION - blurred but present
      // Particles move gracefully around the page
      // ============================================
      const canvas = document.getElementById("particleCanvas");
      let ctx = canvas.getContext("2d");
      let particles = [];
      let particleCount = 75;
      let mouseX = null,
        mouseY = null;
      let animationId = null;

      // Resize canvas to full window
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      // Particle class with soft, visible colors
      class Particle {
        constructor(x, y, radius, color, velocityX, velocityY) {
          this.x = x;
          this.y = y;
          this.radius = radius;
          this.color = color;
          this.vx = velocityX;
          this.vy = velocityY;
        }

        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;

          // Bounce off edges with smooth boundary
          if (this.x + this.radius > canvas.width) {
            this.x = canvas.width - this.radius;
            this.vx = -this.vx;
          } else if (this.x - this.radius < 0) {
            this.x = this.radius;
            this.vx = -this.vx;
          }

          if (this.y + this.radius > canvas.height) {
            this.y = canvas.height - this.radius;
            this.vy = -this.vy;
          } else if (this.y - this.radius < 0) {
            this.y = this.radius;
            this.vy = -this.vy;
          }

          // Gentle mouse interaction - particles subtly move away from cursor
          if (mouseX !== null && mouseY !== null) {
            const dx = this.x - mouseX;
            const dy = this.y - mouseY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const repelRadius = 120;
            if (distance < repelRadius) {
              const force = ((repelRadius - distance) / repelRadius) * 0.8;
              const angle = Math.atan2(dy, dx);
              this.vx += Math.cos(angle) * force;
              this.vy += Math.sin(angle) * force;

              // Limit max speed for smooth motion
              const maxSpeed = 1.8;
              this.vx = Math.min(maxSpeed, Math.max(-maxSpeed, this.vx));
              this.vy = Math.min(maxSpeed, Math.max(-maxSpeed, this.vy));
            }
          }

          // Gentle damping to keep motion smooth
          this.vx *= 0.998;
          this.vy *= 0.998;
        }
      }

      function initParticles() {
        particles = [];
        // Soft, elegant brand colors with opacity for a dreamy look
        const colors = [
          "rgba(77, 189, 121, 0.5)", // brand-400
          "rgba(31, 156, 87, 0.45)", // brand-500
          "rgba(0, 135, 81, 0.4)", // brand-600
          "rgba(131, 215, 165, 0.35)", // brand-300
          "rgba(77, 189, 121, 0.4)",
        ];
        const isDark = document.documentElement.classList.contains("dark");

        for (let i = 0; i < particleCount; i++) {
          const radius = Math.random() * 7 + 2.5; // 2.5px to 9.5px - visible but delicate
          let colorChoice;
          if (isDark) {
            // Slightly brighter for dark mode to maintain visibility
            colorChoice = [
              "rgba(77, 189, 121, 0.55)",
              "rgba(31, 156, 87, 0.5)",
              "rgba(0, 135, 81, 0.45)",
              "rgba(131, 215, 165, 0.4)",
            ][Math.floor(Math.random() * 4)];
          } else {
            colorChoice = colors[Math.floor(Math.random() * colors.length)];
          }

          const x = Math.random() * (canvas.width - radius * 2) + radius;
          const y = Math.random() * (canvas.height - radius * 2) + radius;
          const vx = (Math.random() - 0.5) * 0.8;
          const vy = (Math.random() - 0.5) * 0.8;

          particles.push(new Particle(x, y, radius, colorChoice, vx, vy));
        }
      }

      // Draw subtle connections between nearby particles (adds to the "moving around" feel)
      function drawConnections() {
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < 100) {
              ctx.beginPath();
              const opacity = (1 - distance / 100) * 0.12;
              ctx.strokeStyle = `rgba(31, 156, 87, ${opacity})`;
              ctx.lineWidth = 0.6;
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }
      }

      function animateParticles() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Update and draw each particle
        for (let p of particles) {
          p.update();
          p.draw();
        }
        drawConnections();

        animationId = requestAnimationFrame(animateParticles);
      }

      // Track mouse for interactive repulsion
      function handleMouseMove(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }
        mouseX = (clientX - rect.left) * scaleX;
        mouseY = (clientY - rect.top) * scaleY;
        mouseX = Math.min(canvas.width, Math.max(0, mouseX));
        mouseY = Math.min(canvas.height, Math.max(0, mouseY));
      }

      function handleMouseLeave() {
        mouseX = null;
        mouseY = null;
      }

      // Refresh particle colors on dark mode toggle
      function refreshParticlesForTheme() {
        const isDark = document.documentElement.classList.contains("dark");
        for (let p of particles) {
          if (isDark) {
            p.color = [
              "rgba(77, 189, 121, 0.55)",
              "rgba(31, 156, 87, 0.5)",
              "rgba(0, 135, 81, 0.45)",
              "rgba(131, 215, 165, 0.4)",
            ][Math.floor(Math.random() * 4)];
          } else {
            p.color = [
              "rgba(77, 189, 121, 0.5)",
              "rgba(31, 156, 87, 0.45)",
              "rgba(0, 135, 81, 0.4)",
              "rgba(131, 215, 165, 0.35)",
            ][Math.floor(Math.random() * 4)];
          }
        }
      }

      // Setup canvas and start animation
      function setupParticleSystem() {
        resizeCanvas();
        initParticles();
        animateParticles();

        window.addEventListener("resize", () => {
          resizeCanvas();
          initParticles();
        });

        canvas.addEventListener("mousemove", handleMouseMove);
        canvas.addEventListener("mouseleave", handleMouseLeave);
        canvas.addEventListener("touchmove", handleMouseMove);
        canvas.addEventListener("touchend", handleMouseLeave);
      }

      // ========== UI & AUTH ==========
      // Dark mode detection & sync
      const htmlElement = document.documentElement;
      const storedTheme = localStorage.getItem("theme");
      const systemPrefersDark = window.matchMedia(
        "(prefers-color-scheme: dark)",
      ).matches;

      if (storedTheme === "dark" || (!storedTheme && systemPrefersDark)) {
        htmlElement.classList.add("dark");
      } else {
        htmlElement.classList.remove("dark");
      }

      // Watch for class changes to update particle colors dynamically
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          if (mutation.attributeName === "class") {
            refreshParticlesForTheme();
          }
        });
      });
      observer.observe(htmlElement, { attributes: true });

      window
        .matchMedia("(prefers-color-scheme: dark)")
        .addEventListener("change", (e) => {
          if (!localStorage.getItem("theme")) {
            if (e.matches) htmlElement.classList.add("dark");
            else htmlElement.classList.remove("dark");
            refreshParticlesForTheme();
          }
        });

      // Google Sign-In Handler
      function handleGoogleSignIn() {
        if (
          window.confirm(
            "🔐 Redirect to Google Sign-In\n\nKudiSense uses secure OAuth 2.0.\nTap OK to continue with Google authentication.",
          )
        ) {
          const btn = document.querySelector(
            'button[onclick="handleGoogleSignIn()"]',
          );
          if (btn) {
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="inline-block w-4 h-4 border-2 border-brand-600 border-t-transparent rounded-full animate-spin mr-2"></span> Redirecting...`;
            btn.disabled = true;
            setTimeout(() => {
              btn.innerHTML = originalText;
              btn.disabled = false;
              alert(
                "🚀 Demo mode: You would be redirected to Google.\nAfter sign-in, you'd access your budget dashboard.",
              );
            }, 800);
          } else {
            alert(
              "🚀 Demo mode: You would be redirected to Google.\nAfter sign-in, you'd access your dashboard.",
            );
          }
        }
      }

      // Lucide icons init
      if (typeof lucide !== "undefined" && lucide.createIcons) {
        lucide.createIcons();
      }

      // Start particle animation after DOM ready
      document.addEventListener("DOMContentLoaded", () => {
        setupParticleSystem();
      });

      // Safe area support
      if (CSS && CSS.supports("padding-top: env(safe-area-inset-top)")) {
        const cards = document.querySelectorAll(".card-padding");
        cards.forEach((card) => {
          card.style.paddingLeft = `max(1.25rem, env(safe-area-inset-left))`;
          card.style.paddingRight = `max(1.25rem, env(safe-area-inset-right))`;
        });
      }
    </script>

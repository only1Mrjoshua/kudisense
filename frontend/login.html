<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes"
    />
    <title>KudiSense | Sign in · Secure Access</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* global mobile-first & safe-area optimizations */
      * {
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: "Inter", sans-serif;
        transition:
          background-color 0.2s ease,
          color 0.2s ease;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .lucide {
        width: 1.1rem;
        height: 1.1rem;
        stroke-width: 1.9;
      }
      /* responsive card & spacing utilities */
      .card-padding {
        padding-left: max(1.25rem, env(safe-area-inset-left));
        padding-right: max(1.25rem, env(safe-area-inset-right));
      }
      /* dark mode overrides (seamless) */
      .dark .border-ink-100 {
        border-color: #2a352e;
      }
      .dark .bg-white {
        background-color: #111811;
      }
      .dark .bg-ink-50 {
        background-color: #0f1411;
      }
      .dark .text-ink-600 {
        color: #9aa99f;
      }
      .dark .text-ink-500 {
        color: #8a9a90;
      }
      .dark .text-ink-700 {
        color: #cbd8cf;
      }
      .dark .text-ink-900 {
        color: #edf3ea;
      }
      .dark .bg-brand-50 {
        background-color: #0a2f1f;
      }
      .dark .bg-brand-600 {
        background-color: #008751;
      }
      .dark .hover\:bg-brand-700:hover {
        background-color: #066b43 !important;
      }
      .dark .border-brand-100 {
        border-color: #1a4732;
      }
      .dark .shadow-card {
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }
      /* touch-optimized button */
      .google-btn {
        transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }
      .google-btn:active {
        transform: scale(0.98);
      }
      @media (max-width: 480px) {
        .card-padding {
          padding-left: 1.25rem;
          padding-right: 1.25rem;
        }
      }
      /* focus rings accessible on mobile */
      button:focus-visible,
      a:focus-visible {
        outline: 2px solid #1f9c57;
        outline-offset: 2px;
        border-radius: 0.5rem;
      }
      a,
      button {
        touch-action: manipulation;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#effaf4",
                100: "#d9f3e3",
                200: "#b6e8ca",
                300: "#83d7a5",
                400: "#4dbd79",
                500: "#1f9c57",
                600: "#008751",
                700: "#066b43",
                800: "#0b5437",
                900: "#0b452f",
              },
              ink: {
                50: "#f7f8f7",
                100: "#eef1ef",
                200: "#d9dfdb",
                300: "#b9c4bc",
                400: "#8a9a90",
                500: "#617167",
                600: "#465349",
                700: "#344036",
                800: "#202a23",
                900: "#121712",
              },
            },
            fontFamily: {
              headline: ["Plus Jakarta Sans", "sans-serif"],
              body: ["Inter", "sans-serif"],
            },
            boxShadow: {
              soft: "0 10px 30px rgba(6, 30, 17, 0.08)",
              card: "0 8px 24px rgba(6, 30, 17, 0.06)",
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-ink-50 text-ink-900 antialiased dark:bg-[#0f1411] dark:text-[#edf3ea]"
  >
    <!-- MAIN CONTAINER: full height flex column with logo at top left -->
    <div class="min-h-screen flex flex-col">
      <!-- TOP LEFT LOGO - exactly as requested (touch-friendly, no center alignment) -->
      <div class="pt-6 sm:pt-8 px-5 sm:px-8 lg:px-10">
        <div class="flex justify-start">
          <a
            href="index.html"
            class="flex items-center gap-3 group focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 rounded-2xl transition"
            aria-label="KudiSense home"
          >
            <div
              class="flex h-11 w-11 sm:h-12 sm:w-12 items-center justify-center rounded-2xl bg-brand-600 text-white shadow-card transition-all group-hover:scale-105"
            >
              <span class="font-headline text-xl font-extrabold">K</span>
            </div>
            <div>
              <p
                class="font-headline text-xl sm:text-2xl font-extrabold tracking-tight text-ink-900 dark:text-white leading-tight"
              >
                KudiSense
              </p>
              <p
                class="text-[11px] sm:text-xs font-medium text-ink-500 dark:text-ink-400 -mt-0.5"
              >
                Money clarity for Nigeria
              </p>
            </div>
          </a>
        </div>
      </div>

      <!-- CENTERED SIGN-IN CARD (flexible spacing, moves to middle vertically) -->
      <div
        class="flex-1 flex flex-col justify-center px-4 sm:px-6 lg:px-8 pb-12 sm:pb-16"
      >
        <div class="sm:mx-auto sm:w-full sm:max-w-md w-full mx-auto">
          <!-- headline with responsive spacing (centered text) -->
          <div class="mt-2 sm:mt-0 text-center px-1">
            <h2
              class="font-headline text-2xl sm:text-3xl font-extrabold tracking-tight text-ink-900 dark:text-white"
            >
              Sign in to KudiSense
            </h2>
            <p
              class="mt-2 text-sm sm:text-base text-ink-600 dark:text-ink-300 max-w-xs sm:max-w-none mx-auto"
            >
              Continue with your Google account to access your budget
            </p>
          </div>

          <!-- sign-in card - fully responsive, mobile-first padding -->
          <div class="mt-6 sm:mt-8 w-full">
            <div
              class="bg-white py-7 sm:py-10 px-5 sm:px-10 shadow-card rounded-2xl border border-ink-100 dark:bg-[#111811] dark:border-[#2a352e] transition-all card-padding"
            >
              <!-- Google Sign In button - touch-optimized full width -->
              <button
                type="button"
                onclick="handleGoogleSignIn()"
                class="google-btn flex w-full items-center justify-center gap-3 rounded-xl border border-ink-200 bg-white px-4 py-3.5 sm:py-3.5 text-sm sm:text-base font-semibold text-ink-700 shadow-sm transition-all hover:bg-ink-50 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 dark:border-[#2a352e] dark:bg-[#1e2a22] dark:text-white dark:hover:bg-[#2a352e] active:scale-[0.98]"
                aria-label="Sign in with Google"
              >
                <svg
                  class="h-5 w-5 sm:h-5 sm:w-5"
                  viewBox="0 0 24 24"
                  width="24"
                  height="24"
                  xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true"
                >
                  <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">
                    <path
                      fill="#4285F4"
                      d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z"
                    />
                    <path
                      fill="#34A853"
                      d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z"
                    />
                    <path
                      fill="#FBBC05"
                      d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z"
                    />
                    <path
                      fill="#EA4335"
                      d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z"
                    />
                  </g>
                </svg>
                Sign in with Google
              </button>

              <!-- legal links - easy tap target -->
              <div class="mt-7 sm:mt-8 text-center">
                <p
                  class="text-xs sm:text-sm text-ink-500 dark:text-ink-400 leading-relaxed"
                >
                  By continuing, you agree to our
                  <a
                    href="#"
                    class="font-medium text-brand-600 hover:text-brand-500 dark:text-brand-400 transition underline-offset-2 hover:underline focus:outline-none focus:ring-2 focus:ring-brand-500 rounded-sm"
                    >Terms</a
                  >
                  and
                  <a
                    href="#"
                    class="font-medium text-brand-600 hover:text-brand-500 dark:text-brand-400 transition underline-offset-2 hover:underline focus:outline-none focus:ring-2 focus:ring-brand-500 rounded-sm"
                    >Privacy Policy</a
                  >
                </p>
              </div>

              <!-- sign-up link with bigger tap area -->
              <div class="mt-7 sm:mt-8 text-center">
                <p class="text-sm sm:text-base text-ink-600 dark:text-ink-300">
                  New to KudiSense?
                  <a
                    href="register.html"
                    class="font-semibold text-brand-600 hover:text-brand-500 dark:text-brand-400 transition underline-offset-2 hover:underline focus:outline-none focus:ring-2 focus:ring-brand-500 rounded-sm inline-block ml-1"
                    >Create an account</a
                  >
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Initialize lucide icons (optional but keeps UI consistent)
      if (typeof lucide !== "undefined" && lucide.createIcons) {
        lucide.createIcons();
      }

      // Dark mode detection & sync (respects user preference + local storage)
      const htmlElement = document.documentElement;
      const storedTheme = localStorage.getItem("theme");
      const systemPrefersDark = window.matchMedia(
        "(prefers-color-scheme: dark)",
      ).matches;

      if (storedTheme === "dark" || (!storedTheme && systemPrefersDark)) {
        htmlElement.classList.add("dark");
      } else {
        htmlElement.classList.remove("dark");
      }

      // Listen for system theme changes while page is open (optional)
      window
        .matchMedia("(prefers-color-scheme: dark)")
        .addEventListener("change", (e) => {
          if (!localStorage.getItem("theme")) {
            if (e.matches) {
              htmlElement.classList.add("dark");
            } else {
              htmlElement.classList.remove("dark");
            }
          }
        });

      // Google Sign-In Handler (simulated but production-ready structure)
      function handleGoogleSignIn() {
        if (
          window.confirm(
            "🔐 Redirect to Google Sign-In\n\nKudiSense uses secure OAuth 2.0.\nTap OK to continue with Google authentication.",
          )
        ) {
          console.log(
            "Initiating Google OAuth flow — production would redirect to Google consent screen.",
          );

          // Provide visual feedback on button during demo
          const btn = document.querySelector(
            'button[onclick="handleGoogleSignIn()"]',
          );
          if (btn) {
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2"></span> Redirecting...`;
            btn.disabled = true;

            setTimeout(() => {
              btn.innerHTML = originalText;
              btn.disabled = false;
              alert(
                "🚀 Demo mode: You would be redirected to Google.\nAfter sign-in, you'd access your budget dashboard.",
              );
              // Uncomment the line below for actual OAuth redirect when endpoint ready:
              // window.location.href = '/auth/google';
            }, 800);
          } else {
            alert(
              "🚀 Demo mode: You would be redirected to Google.\nAfter sign-in, you'd access your budget dashboard.",
            );
          }
        }
      }

      // Touch-friendly improvements: ensure any external links have no accidental zoom issues
      const allLinks = document.querySelectorAll("a");
      allLinks.forEach((link) => {
        link.addEventListener("click", (e) => {
          // smooth handling only
        });
      });

      // Safe area support for modern iPhones - ensure card respects notch
      if (CSS && CSS.supports("padding-top: env(safe-area-inset-top)")) {
        document.querySelector(".card-padding")?.classList.add("safe-padding");
      }

      // optional: handle dynamic orientation change (no layout shift)
      window.addEventListener("resize", () => {
        if (
          document.activeElement &&
          document.activeElement.tagName === "BUTTON"
        ) {
          // just keep active state clean
        }
      });

      // Preload any hover effect cleanup for mobile (disable hover on touch devices)
      if ("ontouchstart" in window) {
        document.body.classList.add("touch-device");
        const btns = document.querySelectorAll("button, a");
        btns.forEach((btn) => {
          btn.addEventListener("touchstart", () => {
            // prevents sticky hover
          });
        });
      }
    </script>

    <!-- Additional inline style to ensure perfect mobile fit & avoid horizontal overflow -->
    <style>
      /* Guarantee no overflow on any mobile viewport */
      img,
      svg,
      iframe,
      video,
      object {
        max-width: 100%;
        height: auto;
      }
      body,
      html {
        overflow-x: hidden;
        width: 100%;
      }
      .card-padding {
        padding-left: max(1.25rem, env(safe-area-inset-left));
        padding-right: max(1.25rem, env(safe-area-inset-right));
      }
      @media (max-width: 640px) {
        .shadow-card {
          box-shadow: 0 6px 18px rgba(6, 30, 17, 0.06);
        }
        .google-btn {
          font-size: 0.95rem;
          padding-top: 0.85rem;
          padding-bottom: 0.85rem;
        }
      }
      @media (max-width: 480px) {
        .card-padding {
          padding-left: 1rem;
          padding-right: 1rem;
        }
        .rounded-2xl {
          border-radius: 1.25rem;
        }
      }
      /* smooth dark mode transition */
      .dark .bg-white,
      .dark .border-ink-100,
      .dark .text-ink-700 {
        transition:
          background-color 0.2s,
          border-color 0.2s;
      }
      /* focus rings visible on mobile tab navigation */
      button:focus-visible,
      a:focus-visible {
        outline: 2px solid #1f9c57;
        outline-offset: 2px;
        border-radius: 0.5rem;
      }
      /* make links more tappable */
      a {
        touch-action: manipulation;
      }
      /* loading spinner animation */
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .animate-spin {
        animation: spin 0.7s linear infinite;
      }
      /* top left logo spacing refinement for very small devices */
      @media (max-width: 480px) {
        .pt-6 {
          padding-top: 1rem;
        }
        .px-5 {
          padding-left: 1rem;
          padding-right: 1rem;
        }
      }
    </style>
  </body>
</html>
